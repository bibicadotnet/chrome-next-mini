name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (vd: v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout detours
        run: git clone --depth=1 https://github.com/microsoft/detours detours

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Build detours tools (setdll)
        shell: pwsh
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          $vcvars = "$vs\VC\Auxiliary\Build\vcvars64.bat"
          cmd /c "`"$vcvars`" && nmake /nologo /f detours\src\makefile DETOURS_TARGET_PROCESSOR=X64" 2>&1
          # setdll.exe nằm ở detours\bin.X64\
          Copy-Item detours\bin.X64\setdll.exe setdll-x64.exe

      - name: Configure
        run: xmake f -p windows -a x64 -m release

      - name: Build
        run: xmake

      - name: Package
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          $out = "edge_portable-$tag"
          New-Item -ItemType Directory $out
          Copy-Item build\release\version.dll $out\
          Copy-Item setdll-x64.exe            $out\
          Copy-Item chrome++.ini              $out\
          Get-ChildItem README.md -ErrorAction SilentlyContinue | Copy-Item -Destination $out\
          Compress-Archive -Path $out -DestinationPath "$out.zip"
          echo "TAG=$tag" >> $env:GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: edge_portable-${{ env.TAG }}.zip
          generate_release_notes: true
