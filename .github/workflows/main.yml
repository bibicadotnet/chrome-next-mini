name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout detours
        run: git clone --depth=1 https://github.com/microsoft/detours detours

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Configure
        run: xmake f -p windows -a x64 -m release

      - name: Resolve tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = (Get-Content xmake.lua | Select-String 'APP_VERSION\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
            $tag = "v$ver"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          echo "TAG=$tag" >> $env:GITHUB_ENV

      - name: Build
        run: xmake

      - name: Package
        shell: pwsh
        run: |
          $tag = $env:TAG
          $out = "edge_portable-$tag"
          New-Item -ItemType Directory $out
          Copy-Item build\release\version.dll  $out\
          Copy-Item build\release\setdll-x64.exe $out\
          Copy-Item chrome++.ini               $out\
          Get-ChildItem README.md -ErrorAction SilentlyContinue | Copy-Item -Destination $out\
          Compress-Archive -Path $out -DestinationPath "$out.zip"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: edge_portable-${{ env.TAG }}.zip
          generate_release_notes: true
